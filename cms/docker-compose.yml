services:
    # MongoDB Database
    mongo:
        image: mongo:latest
        restart: always
        ports:
            - '27017:27017'
        environment:
            MONGO_INITDB_ROOT_USERNAME: admin
            MONGO_INITDB_ROOT_PASSWORD: password
        command:
            - --storageEngine=wiredTiger
        volumes:
            - mongodata:/data/db
        networks:
            - payload-network

    # Optional: Mongo Express (MongoDB GUI)
    mongo-express:
        image: mongo-express:latest
        restart: always
        ports:
            - '8081:8081'
        environment:
            ME_CONFIG_MONGODB_ADMINUSERNAME: admin
            ME_CONFIG_MONGODB_ADMINPASSWORD: password
            ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongo:27017/
        depends_on:
            - mongo
        networks:
            - payload-network

volumes:
    mongodata:
    node_modules:

networks:
    payload-network:
        driver: bridge
